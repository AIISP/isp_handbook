site_name: ISP Algorithm Handbook — 图像信号处理算法手册
site_url: https://aiisp.github.io/isp_handbook/
site_description: >-
  Open-source bilingual handbook covering Image Signal Processing (ISP)
  from first principles to LLM-era methods. 125 chapters · Chinese & English.
site_author: ISP Algorithm Handbook Contributors
repo_url: https://github.com/AIISP/isp_handbook
repo_name: AIISP/isp_handbook
edit_uri: edit/main/

docs_dir: .
site_dir: site

# Exclude non-documentation files from the build
exclude_docs: |
  site/
  .git/
  __pycache__/
  *.pyc
  environment.yml
  requirements.txt
  requirements-docs.txt
  ROADMAP.md
  CHANGELOG.md
  CITATION.cff
  code/
  .github/
  mkdocs.yml
  docs/

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换为深色模式
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换为浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  font:
    text: Noto Sans SC
    code: JetBrains Mono

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - tables
  - toc:
      permalink: true
      permalink_title: 链接到此节
  - attr_list
  - md_in_html
  - footnotes
  - abbr

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - https://cdn.jsdelivr.net/npm/@mdi/font@7/css/materialdesignicons.min.css

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AIISP/isp_handbook
      name: GitHub Repository

